services:
  origam-site:
    build:
      context: ..
      dockerfile: marketing/Dockerfile
    container_name: origam-marketing
    restart: unless-stopped
    environment:
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
      - NUXT_PUBLIC_PLAUSIBLE_DOMAIN=${NUXT_PUBLIC_PLAUSIBLE_DOMAIN:-origam.dev}
      - NUXT_PUBLIC_PLAUSIBLE_API_HOST=${NUXT_PUBLIC_PLAUSIBLE_API_HOST:-https://plausible.origam.dev}
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.origam.rule=Host(`origam.dev`)"
      - "traefik.http.routers.origam.entrypoints=https"
      - "traefik.http.routers.origam.tls=true"
      - "traefik.http.routers.origam.tls.certresolver=letsencrypt"
      - "traefik.http.services.origam.loadbalancer.server.port=3000"
