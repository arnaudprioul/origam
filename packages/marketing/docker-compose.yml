# Local-only docker-compose — for testing the production build on your machine.
#
# Usage (from the repository root):
#   docker compose -f packages/marketing/docker-compose.yml up --build
#
# Then open http://localhost:3000
#
# For Coolify deployment we do NOT use this file. Coolify is configured
# to build directly from packages/marketing/Dockerfile with environment variables
# set via the Coolify UI. See packages/marketing/README.md → "Deployment".

services:
  origam-site:
    build:
      context: ../..
      dockerfile: packages/marketing/Dockerfile
    container_name: origam-marketing-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
      # Override to your local hostname if needed. Empty disables canonical.
      - NUXT_PUBLIC_SITE_URL=http://localhost:3000
      - NUXT_PUBLIC_GITHUB_REPO=arnaudprioul/origam
      - NUXT_PUBLIC_NPM_PKG=origam
      - NUXT_PUBLIC_NPM_VERSION=2.5.1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
