sonar.projectKey=arnaudprioul_origam_72a49a37-8abb-4869-85df-cc6244adf0e3
sonar.projectName=Origam

# Analysis is scoped to the PUBLISHED library (packages/ds/src). The other
# workspaces — marketing, stories, docs, figma-plugin — are private support
# packages (private:true, never published); including them only diluted the
# library's coverage (the TU lcov covers packages/ds/src only, so 482 covered
# files were drowned in ~3500 analysed files) and inflated the issue/debt count
# with non-shipped code. They can be added as separate Sonar projects later.
sonar.sources=packages/ds/src
sonar.tests=packages/tests/TU

sonar.sourceEncoding=UTF-8

# Generated / non-product files inside the source tree.
sonar.exclusions=\
packages/ds/src/**/*.spec.ts,\
packages/ds/src/**/*.d.ts,\
packages/ds/src/assets/**

sonar.test.inclusions=\
**/*.spec.ts,\
**/*.test.ts

# Coverage: vitest (v8) emits this lcov at the repo root with SF paths relative
# to the repo root (packages/ds/src/…) — see packages/tests/vitest.config.ts.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Point the TS sensor at the library tsconfig (the root tsconfig.node.json has
# no inputs and produced a scanner ERROR).
sonar.typescript.tsconfigPath=packages/ds/tsconfig.json
