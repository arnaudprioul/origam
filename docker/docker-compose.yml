# docker-compose for local preview of the origam static surfaces.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#   docker compose -f docker/docker-compose.yml up docs
#   docker compose -f docker/docker-compose.yml build stories
#
# Production deployments should pull the published images from GHCR
# (`ghcr.io/arnaudprioul/origam-docs`, `ghcr.io/arnaudprioul/origam-stories`)
# rather than rebuild here — keep this file as a dev convenience only.

services:
  docs:
    image: ghcr.io/arnaudprioul/origam-docs:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.docs
    container_name: origam-docs
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Hot-reload volumes are intentionally NOT mounted: nginx serves
    # pre-built static output, not the Vite/Histoire dev server. For dev
    # with hot-reload, run `npm run docs:dev` on the host instead.
    # volumes:
    #   - ../docs/.vitepress/dist:/usr/share/nginx/html:ro

  stories:
    image: ghcr.io/arnaudprioul/origam-stories:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.stories
    container_name: origam-stories
    ports:
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # volumes:
    #   - ../dist/stories:/usr/share/nginx/html:ro
