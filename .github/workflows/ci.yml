name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-flight runs on the same ref. Tags / release pushes are
# excluded so a release run is never cancelled by a rebase.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  HUSKY: 0
  CI: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Run ESLint (no auto-fix)
        run: npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts --max-warnings 0

  tokens:
    name: Tokens build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Validate tokens JSON
        run: |
          for f in tokens/*.json tokens/semantic/*.json tokens/component/*.json; do
            [ -f "$f" ] || continue
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              || { echo "::error file=$f::Invalid JSON"; exit 1; }
          done

      - name: Tokens lint (strict)
        run: npm run tokens:lint

      - name: Tokens build
        run: npm run tokens:build

      - name: Upload generated token artefacts
        uses: actions/upload-artifact@v4
        with:
          name: tokens-dist
          path: |
            src/assets/css/tokens
            src/assets/scss/tokens
            src/types/tokens.type.ts
          retention-days: 7
          if-no-files-found: error

  test-unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    needs: tokens
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build tokens (prereq for component tests)
        run: npm run tokens:build

      - name: Vitest
        run: npm run test:unit -- --run --reporter=default

  build:
    name: Library build (unbuild)
    runs-on: ubuntu-latest
    needs: tokens
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build library
        run: npm run server:build

      - name: Assert dist output exists
        run: |
          test -d dist/src || { echo "::error::dist/src missing after build"; exit 1; }
          test -f dist/src/origam.js \
            || { echo "::error::dist/src/origam.js missing — entry not emitted"; exit 1; }

      - name: Upload library dist
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  test-e2e:
    name: E2E tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: tokens
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build tokens
        run: npm run tokens:build

      - name: Run Playwright (chromium)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/.report
            tests/e2e/.results
          retention-days: 7
          if-no-files-found: ignore
