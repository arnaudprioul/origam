name: tokens-sync

# Triggered when Tokens Studio for Figma pushes a JSON update to the
# `tokens-sync` branch. The workflow rebuilds the generated CSS/SCSS/TS
# artifacts, commits them, and opens a PR to develop for review.

on:
  push:
    branches:
      - tokens-sync
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-pr:
    name: Rebuild tokens & open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tokens JSON
        run: |
          for f in packages/ds/tokens/*.json packages/ds/tokens/semantic/*.json packages/ds/tokens/component/*.json; do
            jq empty "$f" || { echo "Invalid JSON in $f"; exit 1; }
          done

      - name: Build tokens
        run: pnpm -F origam tokens:build

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: false

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet \
            packages/ds/src/assets/css/tokens \
            packages/ds/src/assets/scss/tokens \
            packages/ds/src/types/tokens.type.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated artifacts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "origam-tokens-bot"
          git config user.email "tokens-bot@users.noreply.github.com"
          git add \
            packages/ds/src/assets/css/tokens \
            packages/ds/src/assets/scss/tokens \
            packages/ds/src/types/tokens.type.ts
          git commit -m "chore(tokens): rebuild generated artifacts from Figma sync"
          git push origin tokens-sync

      - name: Open or update PR to develop
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          existing_pr=$(gh pr list --head tokens-sync --base develop --state open --json number --jq '.[0].number' || echo "")
          if [ -z "$existing_pr" ]; then
            gh pr create \
              --base develop \
              --head tokens-sync \
              --title "chore(tokens): sync from Figma — $DATE" \
              --body "Automated PR generated by tokens-sync workflow.

          Source: Tokens Studio for Figma → branch \`tokens-sync\`
          Generated artifacts:
            - packages/ds/src/assets/css/tokens/*.css
            - packages/ds/src/assets/scss/tokens/*.scss
            - packages/ds/src/types/tokens.type.ts

          Please review the diff carefully — visual regression tests should be triggered by the PR check suite."
          else
            echo "PR #$existing_pr already open — pushed new commit will update it automatically."
          fi
